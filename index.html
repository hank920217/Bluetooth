<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>閃燈控制器</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      background: #f0f2f5;
    }

    .card {
      background: white;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 420px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
    }

    .btn-connect { background: #007bff; color: white; }
    .btn-send { background: #28a745; color: white; }

    .preset-group {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 12px;
    }

    .btn-preset {
      background: #ff9800;
      color: white;
      margin: 0;
    }

    input {
      width: 100%;
      padding: 10px;
      box-sizing: border-box;
      margin-bottom: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
    }

    #status {
      font-size: 0.9rem;
      color: #666;
      margin-top: 10px;
      line-height: 1.5;
      white-space: pre-line;
    }

    #deviceList {
      margin-top: 12px;
      font-size: 0.9rem;
      color: #333;
      background: #fafafa;
      border: 1px solid #eee;
      border-radius: 8px;
      padding: 10px;
    }

    #deviceList ul {
      margin: 8px 0 0 18px;
      padding: 0;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 9999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.45);
      justify-content: center;
      align-items: center;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      background: #fff;
      width: 90%;
      max-width: 340px;
      border-radius: 14px;
      padding: 24px 20px;
      text-align: center;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    .modal-title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .modal-message {
      font-size: 15px;
      color: #555;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .modal-input {
      width: 100%;
      padding: 10px;
      margin-bottom: 16px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 16px;
      box-sizing: border-box;
    }

    .modal-success .modal-title {
      color: #28a745;
    }

    .modal-error .modal-title {
      color: #dc3545;
    }

    .modal-btn {
      background: #007bff;
      color: white;
      margin: 0;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>MAHO</h2>

  <button class="btn-connect" onclick="connectBle()">1. 連接藍牙裝置</button>

  <hr />

  <input
    type="text"
    id="msgInput"
    placeholder="輸入要傳送的文字..."
    value="Hello"
  />

  <button class="btn-send" onclick="sendData()" id="sendBtn" disabled>
    2. 發送訊息
  </button>

  <div class="preset-group">
    <button class="btn-preset" onclick="sendPreset(1)" id="flash1Btn" disabled>閃一下</button>
    <button class="btn-preset" onclick="sendPreset(2)" id="flash2Btn" disabled>閃兩下</button>
    <button class="btn-preset" onclick="sendPreset(3)" id="flash3Btn" disabled>閃三下</button>
  </div>

  <div id="status">狀態: 尚未連線</div>
  <div id="deviceList">已連線裝置：0 台</div>
</div>

<!-- 驗證碼輸入視窗 -->
<div id="authModal" class="modal">
  <div class="modal-content">
    <div class="modal-title">輸入驗證碼</div>
    <div class="modal-message">請輸入裝置驗證碼後按確認</div>
    <input id="authCodeInput" class="modal-input" type="password" placeholder="請輸入驗證碼" />
    <button class="modal-btn" onclick="submitAuthCode()">確認</button>
  </div>
</div>

<!-- 結果視窗 -->
<div id="resultModal" class="modal">
  <div id="resultBox" class="modal-content">
    <div id="resultTitle" class="modal-title">提示</div>
    <div id="resultMessage" class="modal-message">內容</div>
    <button class="modal-btn" onclick="handleResultConfirm()">確認</button>
  </div>
</div>

<script>
  const SERVICE_UUID = '000000ff-0000-1000-8000-00805f9b34fb';
  const CHARACTERISTIC_UUID = '0000ff01-0000-1000-8000-00805f9b34fb';

  let devices = [];
  let authenticated = false;
  let pendingAuth = false;
  let lastAuthResult = null;

  function setStatus(text) {
    document.getElementById('status').innerText = text;
  }

  function setButtonsDisabled(disabled) {
    document.getElementById('sendBtn').disabled = disabled;
    document.getElementById('flash1Btn').disabled = disabled;
    document.getElementById('flash2Btn').disabled = disabled;
    document.getElementById('flash3Btn').disabled = disabled;
  }

  function updateButtonsState() {
    setButtonsDisabled(!(devices.length > 0 && authenticated));
  }

  function updateDeviceList() {
    const box = document.getElementById('deviceList');

    if (devices.length === 0) {
      box.innerHTML = '已連線裝置：0 台';
      return;
    }

    const listHtml = devices.map((d, index) => {
      const name = d.device?.name || `裝置 ${index + 1}`;
      return `<li>${name}</li>`;
    }).join('');

    box.innerHTML = `
      已連線裝置：${devices.length} 台
      <ul>${listHtml}</ul>
    `;
  }

  function showAuthModal() {
    document.getElementById('authCodeInput').value = '';
    document.getElementById('authModal').classList.add('show');
    setTimeout(() => {
      document.getElementById('authCodeInput').focus();
    }, 50);
  }

  function closeAuthModal() {
    document.getElementById('authModal').classList.remove('show');
  }

  function showResultModal(type, title, message) {
    const modal = document.getElementById('resultModal');
    const box = document.getElementById('resultBox');
    document.getElementById('resultTitle').innerText = title;
    document.getElementById('resultMessage').innerText = message;

    box.className = 'modal-content ' + (type === 'success' ? 'modal-success' : 'modal-error');
    modal.classList.add('show');
  }

  function closeResultModal() {
    document.getElementById('resultModal').classList.remove('show');
  }

  function handleResultConfirm() {
    closeResultModal();

    if (lastAuthResult === 'fail') {
      showAuthModal();
    }
  }

  function isAlreadyConnected(deviceId) {
    return devices.some(d => d.device && d.device.id === deviceId);
  }

  function removeDevice(deviceId) {
    devices = devices.filter(d => d.device && d.device.id !== deviceId);

    if (devices.length === 0) {
      authenticated = false;
      pendingAuth = false;
    }

    updateButtonsState();
    updateDeviceList();

    if (devices.length === 0) {
      setStatus('狀態: 已全部斷線');
    } else {
      setStatus(`狀態: 剩餘 ${devices.length} 台裝置連線中`);
    }
  }

  async function writeToAll(msg) {
    if (devices.length === 0) {
      throw new Error('目前沒有任何已連線裝置');
    }

    const data = new TextEncoder().encode(msg);

    for (const item of devices) {
      if (item.characteristic.writeValueWithResponse) {
        await item.characteristic.writeValueWithResponse(data);
      } else {
        await item.characteristic.writeValue(data);
      }
    }
  }

  function handleNotifyValue(event) {
    const value = new TextDecoder().decode(event.target.value);
    console.log('Notify:', value);

    if (value === 'AUTH_OK') {
      authenticated = true;
      pendingAuth = false;
      lastAuthResult = 'success';
      closeAuthModal();
      updateButtonsState();
      setStatus('狀態: 驗證成功');
      showResultModal('success', '驗證成功', '裝置已成功驗證。');
      return;
    }

    if (value === 'AUTH_FAIL') {
      authenticated = false;
      pendingAuth = false;
      lastAuthResult = 'fail';
      updateButtonsState();
      closeAuthModal();
      setStatus('狀態: 驗證失敗');
      showResultModal('error', '驗證失敗', '驗證碼錯誤，請重新輸入。');
      return;
    }

    if (value === 'AUTH_REQUIRED') {
      authenticated = false;
      updateButtonsState();
      setStatus('狀態: 尚未驗證');
    }
  }

  async function connectBle() {
    try {
      setStatus('狀態: 正在搜尋裝置...');

      const device = await navigator.bluetooth.requestDevice({
        filters: [{ namePrefix: 'maho' }],
        optionalServices: [SERVICE_UUID]
      });

      if (isAlreadyConnected(device.id)) {
        setStatus(`狀態: ${device.name || '裝置'} 已經連線過了`);
        return;
      }

      const server = await device.gatt.connect();
      const service = await server.getPrimaryService(SERVICE_UUID);
      const characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

      await characteristic.startNotifications();
      characteristic.addEventListener('characteristicvaluechanged', handleNotifyValue);

      const disconnectHandler = () => {
        console.log('裝置已斷線:', device.name);
        removeDevice(device.id);
      };

      device.addEventListener('gattserverdisconnected', disconnectHandler);

      devices.push({
        device,
        server,
        characteristic
      });

      authenticated = false;
      pendingAuth = false;
      updateButtonsState();
      updateDeviceList();
      setStatus(`狀態: 連線成功，目前共 ${devices.length} 台裝置`);

      // 連線成功後立刻跳輸入視窗
      showAuthModal();

    } catch (error) {
      console.error(error);

      if (error && (error.name === 'NotFoundError' || /cancelled/i.test(error.message))) {
        setStatus('狀態: 已取消裝置選擇');
        return;
      }

      setStatus('錯誤: ' + error.message);
      showResultModal('error', '連線失敗', error.message);
    }
  }

  async function submitAuthCode() {
    const code = document.getElementById('authCodeInput').value.trim();
    if (!code) {
      showResultModal('error', '驗證失敗', '請輸入驗證碼。');
      return;
    }

    if (devices.length === 0) {
      showResultModal('error', '驗證失敗', '目前沒有已連線裝置。');
      return;
    }

    try {
      pendingAuth = true;
      setStatus('狀態: 正在驗證...');
      await writeToAll('AUTH:' + code);
    } catch (error) {
      pendingAuth = false;
      setStatus('錯誤: ' + error.message);
      showResultModal('error', '驗證失敗', error.message);
    }
  }

  async function sendData() {
    const msg = document.getElementById('msgInput').value.trim();
    if (!msg) return;

    if (!authenticated) {
      showResultModal('error', '尚未驗證', '請先完成裝置驗證。');
      return;
    }

    try {
      await writeToAll(msg);
      setStatus(`狀態: 已發送訊息到 ${devices.length} 台裝置`);
    } catch (error) {
      setStatus('錯誤: ' + error.message);
      showResultModal('error', '發送失敗', error.message);
    }
  }

  async function sendPreset(number) {
    if (!authenticated) {
      showResultModal('error', '尚未驗證', '請先完成裝置驗證。');
      return;
    }

    try {
      await writeToAll(String(number));
      setStatus(`狀態: 已發送數字 ${number} 到 ${devices.length} 台裝置`);
    } catch (error) {
      setStatus('錯誤: ' + error.message);
      showResultModal('error', '發送失敗', error.message);
    }
  }

  updateButtonsState();
  updateDeviceList();
</script>

</body>
</html>
